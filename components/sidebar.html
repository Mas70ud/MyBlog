<aside class="sidebar">
  <div class="profile-area">
    <button class="theme-toggle" id="darkModeToggle" aria-label="Dark/Light mode">
      <i class="fas fa-moon"></i>
    </button>
    <button class="lang-toggle" id="langToggle" aria-label="Language">
      <i class="fas fa-language"></i>
    </button>
    <div class="avatar">
      <picture>
        <source srcset="avatar.webp" type="image/webp">
         <img src="https://randomuser.me/api/portraits/men/32.jpg" alt="Profile  picture">
      </picture>
    </div>
    <div class="profile-info">
      <h2 id="name">Write Name here</h2>
      <div class="bio" id="bio">Write Bio here</div>
      <div class="location">
        <i class="fas fa-map-marker-alt"></i> 
        <span id="location">Write location here</span>
      </div>
    </div>
  </div>
</aside>
